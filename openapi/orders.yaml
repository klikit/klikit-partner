openapi: 3.1.0
info:
  title: klikit Partner API — Orders
  version: 1.0.0
  description: |
    Order webhooks (klikit → partner) and the partner-side order read +
    status callback API.

    Webhook event types carry a `.vN` version suffix (`order.placed.v1`, …).
    The JSON-schema for each event lives in
    [`openapi/events/`](./events/); this file documents the HTTP delivery shape.

    See [02-orders.md](../02-orders.md) for the prose contract and per-provider
    nuances, and [CONTRACT.md](../CONTRACT.md) for the frozen reference.
  contact:
    name: klikit Partner Integrations
    email: partners@klikit.io
  license:
    name: Proprietary — klikit Partner Integration Terms
    url: https://klikit.io/legal/partner-terms
servers:
  - url: https://gateway-enterprise.klikit.io
    description: Production
  - url: https://gateway-sandbox.klikit.io
    description: Sandbox

tags:
  - name: Orders
    description: Order reads and status callbacks (partner → klikit)
  - name: Reference
    description: Cancel reasons, providers
  - name: Webhooks
    description: Outbound order webhooks (klikit → partner)

security:
  - bearerAuth: []

paths:
  /v1/partner/orders:
    get:
      tags: [Orders]
      summary: List orders (paginated)
      description: |
        Returns orders for the authenticated credential's `business_id`. Cursor
        pagination — cursors are opaque and not stable across deploys.

        The `from`/`to` window may not exceed 90 days; a wider range returns
        `400 invalid_range`. Requires the `orders:read` scope.
      operationId: listOrders
      parameters:
        - { name: status,      in: query, schema: { $ref: '#/components/schemas/OrderStatusAlias' }, description: "Filter by status. Repeat the param for multiple values." }
        - { name: provider_id, in: query, schema: { type: integer }, description: "Filter by aggregator provider id." }
        - { name: brand_id,    in: query, schema: { type: integer } }
        - { name: branch_id,   in: query, schema: { type: integer } }
        - { name: from,        in: query, schema: { type: string, format: date-time }, description: "Lower bound on placed_at (inclusive)." }
        - { name: to,          in: query, schema: { type: string, format: date-time }, description: "Upper bound on placed_at (inclusive). (to - from) must be <= 90 days." }
        - { name: cursor,      in: query, schema: { type: string }, description: "Opaque cursor from a prior X-Klikit-Next-Cursor header." }
        - { name: limit,       in: query, schema: { type: integer, default: 25, minimum: 1, maximum: 100 }, description: "Page size. Default 25, max 100." }
      responses:
        '200':
          description: Order list
          headers:
            X-Klikit-Next-Cursor:
              schema: { type: string }
              description: Pass to the `cursor` query param to fetch the next page. Absent when there are no more pages.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Order' }
        '400':
          description: |
            Invalid input — malformed parameter (`validation_error`) or a
            `from`/`to` window wider than 90 days (`invalid_range`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                invalid_range:
                  value:
                    error:
                      code: invalid_range
                      message: "Date range exceeds the 90-day maximum."
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/InsufficientScope' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /v1/partner/orders/{order_id}:
    get:
      tags: [Orders]
      summary: Get a single order
      description: Returns the full order payload. Requires the `orders:read` scope.
      operationId: getOrder
      parameters:
        - { name: order_id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Order
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/Order' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/InsufficientScope' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /v1/partner/orders/{order_id}/status:
    patch:
      tags: [Orders]
      summary: Advance order status (accept, reject, ready, picked_up, cancel)
      description: |
        Partner-driven status transitions. Requires the `orders:write` scope.
        Valid transitions:
        - placed → accepted | cancelled
        - accepted → ready | cancelled
        - ready → picked_up (pickup/dine-in only) | cancelled
        - picked_up, delivered, cancelled → terminal (no transitions)

        `delivery` orders are completed by the rider/aggregator, not the
        partner — do not call with `status: picked_up` for those.

        An `Idempotency-Key` header is required; replays within 24h return the
        cached response. Reusing a key with a different body returns
        `409 idempotency_conflict`.
      operationId: updateOrderStatus
      parameters:
        - { name: order_id, in: path, required: true, schema: { type: string } }
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StatusUpdateRequest' }
            examples:
              accept:
                value: { status: accepted, estimated_ready_at: "2026-05-15T10:30:00Z" }
              cancel:
                value: { status: cancelled, reason_code: out_of_items, note: "Beef patty 86'd" }
              ready:
                value: { status: ready }
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StatusUpdateResponse' }
        '400':
          description: |
            Invalid input — malformed body (`validation_error`), a `cancelled`
            transition with no `reason_code`, or a `reason_code` not in
            `GET /v1/partner/orders/cancel-reasons` (`invalid_reason_code`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                invalid_reason_code:
                  value:
                    error:
                      code: invalid_reason_code
                      message: "reason_code 'kitchen_on_fire' is not a recognised cancel reason."
                missing_reason_code:
                  value:
                    error:
                      code: invalid_reason_code
                      message: "reason_code is required when status is 'cancelled'."
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/InsufficientScope' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: |
            Conflict — an invalid state transition (`invalid_transition`), an
            aggregator that refused the cancel (`provider_rejected_cancel`), or
            an idempotency key reused with a different body
            (`idempotency_conflict`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                invalid_transition:
                  value:
                    error:
                      code: invalid_transition
                      message: "Cannot move from 'delivered' to 'accepted'."
                      details: { current_status: delivered }
                provider_rejected:
                  value:
                    error:
                      code: provider_rejected_cancel
                      message: "Aggregator refused cancellation — rider already assigned."
                idempotency_conflict:
                  value:
                    error:
                      code: idempotency_conflict
                      message: "Idempotency-Key already used with a different request body."
        '429': { $ref: '#/components/responses/RateLimited' }

  /v1/partner/orders/cancel-reasons:
    get:
      tags: [Reference]
      summary: List cancel reason codes
      description: |
        Returns the canonical cancel reason enumeration. `reason_code` on a
        cancel must be one of these. Requires the `orders:read` scope.
      operationId: listCancelReasons
      responses:
        '200':
          description: Reasons
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/CancelReason' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/InsufficientScope' }

  /v1/partner/providers:
    get:
      tags: [Reference]
      summary: List active aggregator providers
      description: Requires the `orders:read` scope.
      operationId: listProviders
      responses:
        '200':
          description: Providers
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Provider' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/InsufficientScope' }

webhooks:
  order.placed.v1:
    post:
      tags: [Webhooks]
      operationId: webhookOrderPlaced
      summary: New order received by klikit
      description: |
        Fires once when a new order arrives, regardless of channel
        (marketplace, webshop, dine-in, scan-to-order). The partner endpoint
        must respond 2xx within 10s. Verify the HMAC signature in the
        `X-Klikit-Signature` header before trusting the body — see
        [01-authentication.md](../01-authentication.md) §4.
      requestBody:
        $ref: '#/components/requestBodies/OrderEventBody'
      responses:
        '200':
          description: Acknowledged. Any 2xx is treated as success.

  order.updated.v1:
    post:
      tags: [Webhooks]
      operationId: webhookOrderUpdated
      summary: Order details updated (not status)
      description: Customer note, address, or delivery instruction changed.
      requestBody:
        $ref: '#/components/requestBodies/OrderEventBody'
      responses:
        '200': { description: Acknowledged }

  order.cancelled.v1:
    post:
      tags: [Webhooks]
      operationId: webhookOrderCancelled
      summary: Order cancelled (any party)
      requestBody:
        $ref: '#/components/requestBodies/OrderEventBody'
      responses:
        '200': { description: Acknowledged }

  order.amended.v1:
    post:
      tags: [Webhooks]
      operationId: webhookOrderAmended
      summary: Post-hoc correction to a completed order
      description: |
        Operator-driven correction. Replacement payload, not a delta —
        the partner should reconcile the entire order against this body.
      requestBody:
        $ref: '#/components/requestBodies/OrderEventBody'
      responses:
        '200': { description: Acknowledged }

  order.courier_assigned.v1:
    post:
      tags: [Webhooks]
      operationId: webhookOrderCourierAssigned
      summary: A rider/courier has been assigned to a delivery order
      description: |
        Fires for `delivery` orders once the aggregator assigns a courier.
        `data.fulfilment.rider` is populated.
      requestBody:
        $ref: '#/components/requestBodies/OrderEventBody'
      responses:
        '200': { description: Acknowledged }

  order.picked_up.v1:
    post:
      tags: [Webhooks]
      operationId: webhookOrderPickedUp
      summary: Order collected from the store
      description: |
        Fires when the order leaves the store — courier pickup for delivery, or
        customer/staff handoff for pickup / dine-in / scan-to-order.
      requestBody:
        $ref: '#/components/requestBodies/OrderEventBody'
      responses:
        '200': { description: Acknowledged }

  order.delivered.v1:
    post:
      tags: [Webhooks]
      operationId: webhookOrderDelivered
      summary: Delivery order completed
      description: |
        Fires when a `delivery` order is confirmed delivered. ERP partners
        commonly trigger invoicing on this event. The aggregator commission
        breakdown is included in `data.totals.aggregator_commission` when the
        originating platform supplies it; the field is `null` otherwise.
      requestBody:
        $ref: '#/components/requestBodies/OrderEventBody'
      responses:
        '200': { description: Acknowledged }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, format: uuid }
      description: |
        Replay-safe key chosen by the partner (UUID v4). klikit caches the
        response for 24h. Required on every write.

  requestBodies:
    OrderEventBody:
      required: true
      content:
        application/json:
          schema: { $ref: '#/components/schemas/OrderEvent' }
          examples:
            order_placed:
              summary: order.placed.v1 event
              value:
                event_id: 6f1a8e2c-0b3d-4f5a-9c7e-1d2b3a4c5d6e
                event_type: order.placed.v1
                event_version: "1.0"
                created_at: "2026-05-15T10:14:23Z"
                business_id: 42
                data:
                  id: ord_01HX7K4J4M9V2P0Q5T8Z3W6Y1B
                  short_id: K7X9M2
                  external_id: GF-20260515-12345
                  business_id: 42
                  brand_id: 10
                  branch_id: 100
                  provider: { id: 6, name: grabfood, display_name: GrabFood }
                  channel: marketplace
                  status: placed
                  status_code: 1
                  order_type: delivery
                  placed_at: "2026-05-15T10:14:20Z"
                  customer:
                    name: Aiko Tanaka
                    phone: "+66800000000"
                    email: null
                  items:
                    - klikit_item_id: 12345
                      partner_item_id: POS-SKU-998
                      sku: BURGER-CLASSIC
                      name: Classic Cheeseburger
                      quantity: 2
                      unit_price: 199.00
                      subtotal: 398.00
                      modifiers: []
                  totals:
                    currency: THB
                    subtotal: 398.00
                    delivery_fee: 25.00
                    service_fee: 10.00
                    vat_amount: 30.66
                    merchant_total: 463.00
                    customer_total: 463.00
                    aggregator_commission: null
                  payment: { method: card, status: paid, is_prepaid: true }
                  fulfilment: { mode: rider_delivery }
                  created_at: "2026-05-15T10:14:20Z"
                  updated_at: "2026-05-15T10:14:23Z"

  responses:
    Unauthenticated:
      description: Missing, expired, or invalid token (`unauthenticated`)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example:
            error: { code: unauthenticated, message: "Missing or invalid access token." }
    InsufficientScope:
      description: Token lacks the scope required for this endpoint (`insufficient_scope`)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example:
            error: { code: insufficient_scope, message: "Token does not grant 'orders:write'." }
    NotFound:
      description: Order not found, or not owned by this credential's business (`order_not_found`)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example:
            error: { code: order_not_found, message: "No order with that id for this business." }
    RateLimited:
      description: Rate limit exceeded (`rate_limit_exceeded`)
      headers:
        Retry-After:
          schema: { type: integer }
          description: Seconds to wait before retrying.
        X-RateLimit-Limit:
          schema: { type: integer }
        X-RateLimit-Remaining:
          schema: { type: integer }
        X-RateLimit-Reset:
          schema: { type: integer }
          description: Unix timestamp when the window resets.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example:
            error: { code: rate_limit_exceeded, message: "Too many requests." }

  schemas:
    OrderStatusAlias:
      type: string
      enum: [placed, accepted, cancelled, ready, delivered, picked_up]

    Order:
      type: object
      required: [id, short_id, business_id, brand_id, branch_id, provider, channel, status, status_code, order_type, placed_at, customer, items, totals, payment, fulfilment, created_at, updated_at]
      properties:
        id:               { type: string, description: klikit-issued opaque id }
        short_id:         { type: string, description: Human-friendly id surfaced on receipts }
        external_id:      { type: [string, "null"], description: "Provider-side id (e.g. GrabFood order #)" }
        business_id:      { type: integer }
        brand_id:         { type: integer }
        branch_id:        { type: integer }
        provider:         { $ref: '#/components/schemas/Provider' }
        channel:          { type: string, enum: [marketplace, webshop, dine_in, scan_to_order] }
        status:           { $ref: '#/components/schemas/OrderStatusAlias' }
        status_code:      { type: integer, description: "Numeric status (1=placed, 2=accepted, 3=cancelled, 4=ready, 5=delivered, 9=picked_up)" }
        status_history:
          type: array
          items:
            type: object
            required: [status, at, by]
            properties:
              status: { $ref: '#/components/schemas/OrderStatusAlias' }
              at:     { type: string, format: date-time }
              by:     { type: string, enum: [system, partner, aggregator, customer, operator] }
              reason_code: { type: [string, "null"] }
        order_type:       { type: string, enum: [pickup, delivery, dine_in, scan_to_order] }
        placed_at:        { type: string, format: date-time }
        scheduled_for:    { type: [string, "null"], format: date-time }
        customer:         { $ref: '#/components/schemas/Customer' }
        items:
          type: array
          items: { $ref: '#/components/schemas/OrderItem' }
        totals:           { $ref: '#/components/schemas/OrderTotals' }
        payment:          { $ref: '#/components/schemas/Payment' }
        fulfilment:       { $ref: '#/components/schemas/Fulfilment' }
        metadata:
          type: object
          properties:
            cutlery:           { type: [boolean, "null"] }
            tax_id:            { type: [string, "null"] }
            is_dine_in_table:  { type: [string, "null"] }
            provider_metadata: { type: object, additionalProperties: true }
        created_at:       { type: string, format: date-time }
        updated_at:       { type: string, format: date-time }

    Customer:
      type: object
      required: [name, phone]
      properties:
        name:    { type: string }
        phone:   { type: string }
        email:   { type: [string, "null"], format: email }
        address:
          type: [object, "null"]
          required: [line1, country]
          properties:
            line1:        { type: string }
            line2:        { type: [string, "null"] }
            city:         { type: string }
            postcode:     { type: [string, "null"] }
            country:      { type: string, description: ISO-3166-1 alpha-2 }
            latitude:     { type: [number, "null"] }
            longitude:    { type: [number, "null"] }
            instructions: { type: [string, "null"] }

    OrderItem:
      type: object
      required: [klikit_item_id, name, quantity, unit_price, subtotal]
      properties:
        klikit_item_id:       { type: integer }
        partner_item_id:      { type: [string, "null"], description: "Populated only if a mapping is registered" }
        sku:                  { type: [string, "null"] }
        name:                 { type: string }
        quantity:             { type: integer, minimum: 1 }
        unit_price:           { type: number }
        subtotal:             { type: number }
        modifiers:
          type: array
          items: { $ref: '#/components/schemas/OrderModifier' }
        special_instructions: { type: [string, "null"] }
        vat_amount:           { type: [number, "null"] }

    OrderModifier:
      type: object
      required: [klikit_modifier_id, name, unit_price, quantity, subtotal]
      properties:
        klikit_modifier_id:   { type: integer }
        partner_modifier_id:  { type: [string, "null"] }
        group_name:           { type: [string, "null"] }
        name:                 { type: string }
        unit_price:           { type: number }
        quantity:             { type: integer, minimum: 1 }
        subtotal:             { type: number }

    OrderTotals:
      type: object
      required: [currency, subtotal, merchant_total, customer_total]
      properties:
        currency:        { type: string, description: ISO-4217 }
        currency_symbol: { type: [string, "null"] }
        subtotal:        { type: number }
        discount_amount: { type: number, default: 0 }
        delivery_fee:    { type: number, default: 0 }
        service_fee:     { type: number, default: 0 }
        additional_fee:  { type: number, default: 0 }
        vat_amount:      { type: number, default: 0 }
        merchant_total:  { type: number, description: What the merchant is owed }
        customer_total:  { type: number, description: What the customer paid }
        aggregator_commission:
          type: [number, "null"]
          description: |
            Aggregator commission deducted from this order, in the order's
            currency. Populated on `order.delivered.v1` when the originating
            platform supplies it; `null` when unavailable. See BRD
            reconciliation §5.

    Payment:
      type: object
      required: [method, status, is_prepaid]
      properties:
        method:     { type: string, enum: [cash, card, wallet, invoice] }
        channel_id: { type: [integer, "null"] }
        status:     { type: string, enum: [paid, pending, failed, refunded] }
        is_prepaid: { type: boolean }

    Fulfilment:
      type: object
      required: [mode]
      properties:
        mode: { type: string, enum: [self_pickup, rider_delivery, dine_in] }
        rider:
          type: [object, "null"]
          properties:
            status:  { type: string, enum: [searching, assigned, arrived, en_route, completed, failed] }
            name:    { type: [string, "null"] }
            phone:   { type: [string, "null"] }
            vehicle: { type: [string, "null"] }
        pickup_at:    { type: [string, "null"], format: date-time }
        delivered_at: { type: [string, "null"], format: date-time }

    Provider:
      type: object
      required: [id, name, display_name]
      properties:
        id:           { type: integer }
        name:         { type: string, example: grabfood }
        display_name: { type: string, example: GrabFood }

    CancelReason:
      type: object
      required: [code, label]
      properties:
        code:  { type: string, example: out_of_items }
        label: { type: string, example: "Items unavailable" }

    StatusUpdateRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [accepted, cancelled, ready, picked_up]
          description: "`placed` and `delivered` are not partner-settable."
        reason_code:
          type: [string, "null"]
          description: "Required when status=cancelled. Must be a code from /v1/partner/orders/cancel-reasons."
        estimated_ready_at:
          type: [string, "null"]
          format: date-time
        note:
          type: [string, "null"]

    StatusUpdateResponse:
      type: object
      required: [id, status, status_code, updated_at, provider_propagation]
      properties:
        id:          { type: string }
        status:      { $ref: '#/components/schemas/OrderStatusAlias' }
        status_code: { type: integer }
        updated_at:  { type: string, format: date-time }
        provider_propagation:
          type: object
          required: [state]
          properties:
            state:         { type: string, enum: [queued, propagated, failed, not_required] }
            attempted_at:  { type: [string, "null"], format: date-time }
            error:         { type: [string, "null"] }

    OrderEvent:
      type: object
      description: |
        Outbound webhook envelope. The `event_type` carries the `.vN` version
        suffix; the JSON-schema for each type is in `openapi/events/`.
      required: [event_id, event_type, event_version, created_at, business_id, data]
      properties:
        event_id:      { type: string, format: uuid, description: "Stable across retries — dedupe on this." }
        event_type:
          type: string
          enum:
            - order.placed.v1
            - order.updated.v1
            - order.cancelled.v1
            - order.amended.v1
            - order.courier_assigned.v1
            - order.picked_up.v1
            - order.delivered.v1
        event_version: { type: string, example: "1.0", description: "Human schema version string. The authoritative version is the .vN in event_type." }
        created_at:    { type: string, format: date-time, description: "When klikit emitted the event." }
        business_id:   { type: integer }
        data:          { $ref: '#/components/schemas/Order' }

    Error:
      type: object
      description: Canonical error envelope for all non-OAuth partner endpoints.
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:    { type: string }
            message: { type: string }
            details: { type: object, additionalProperties: true }
