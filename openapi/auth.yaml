openapi: 3.1.0
info:
  title: klikit Partner API — Authentication
  version: 1.0.0
  description: |
    OAuth2 client credentials flow for klikit partners.

    Tokens carry four claims — `scope`, `partner_id`, `business_id`, `tenant` —
    and are valid for 1 hour. There is no refresh token; re-request near expiry.

    See [01-authentication.md](../01-authentication.md) for the prose contract
    and [CONTRACT.md](../CONTRACT.md) for the frozen scope / claim reference.
  contact:
    name: klikit Partner Integrations
    email: partners@klikit.io
  license:
    name: Proprietary — klikit Partner Integration Terms
    url: https://klikit.io/legal/partner-terms
servers:
  - url: https://gateway-enterprise.klikit.io
    description: Production
  - url: https://gateway-sandbox.klikit.io
    description: Sandbox

tags:
  - name: Auth
    description: OAuth2 token issuance

paths:
  /v1/partner/oauth/token:
    post:
      tags: [Auth]
      summary: Exchange client credentials for an access token
      description: |
        OAuth2 `client_credentials` grant. Returns a short-lived bearer token
        (TTL 3600s / 1 hour). Partners must re-request a token before expiry —
        there is no refresh token in this flow.

        The token is a JWT carrying `scope`, `partner_id`, `business_id`, and
        `tenant` claims. A `prod_*` credential can only mint tokens on the
        production gateway; a `sbx_*` credential only on the sandbox gateway.
      operationId: issueToken
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRequest'
            examples:
              all-scopes:
                summary: POS partner requesting all order + menu scopes
                value:
                  grant_type: client_credentials
                  client_id: prod_a1b2c3d4-e5f6-4789-a0b1-c2d3e4f5a6b7
                  client_secret: cs_live_xxxxxxxxxxxxxxxxxxxxxxxx
                  scope: orders:read orders:write menus:read mapping:write stock:write
              read-only:
                summary: ERP partner — read-only orders
                value:
                  grant_type: client_credentials
                  client_id: prod_d4e5f6a7-b8c9-4012-d3e4-f5a6b7c8d9e0
                  client_secret: cs_live_yyyyyyyyyyyyyyyyyyyyyyyy
                  scope: orders:read
              sandbox:
                summary: Sandbox credential requesting sandbox fire scope
                value:
                  grant_type: client_credentials
                  client_id: sbx_11112222-3333-4444-5555-666677778888
                  client_secret: cs_sbx_zzzzzzzzzzzzzzzzzzzzzzzz
                  scope: orders:read orders:write menus:read mapping:write stock:write sandbox:write
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              example:
                access_token: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
                token_type: Bearer
                expires_in: 3600
                scope: orders:read orders:write menus:read mapping:write stock:write
        '400':
          description: |
            Invalid request — missing required form field
            (`invalid_request`) or a requested scope not granted to the
            credential (`invalid_scope`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
              examples:
                invalid_request:
                  value:
                    error: invalid_request
                    error_description: Missing required parameter 'client_secret'.
                invalid_scope:
                  value:
                    error: invalid_scope
                    error_description: Requested scope 'stock:write' not granted to this credential.
        '401':
          description: |
            Client authentication failed — wrong `client_id` / `client_secret`,
            a revoked credential, or a credential used against the wrong tenant
            gateway.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
              example:
                error: invalid_client
                error_description: Client authentication failed.
        '429':
          description: Rate limited — more than 60 token requests/min/client_id
          headers:
            Retry-After:
              schema: { type: integer }
              description: Seconds to wait before retrying
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
              example:
                error: rate_limit_exceeded
                error_description: Token endpoint limited to 60 requests per minute.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Access token from `/v1/partner/oauth/token`. Required on every
        partner-facing endpoint in `orders.yaml` and `menus.yaml`. The token's
        `scope` claim is enforced per-endpoint — see [CONTRACT.md](../CONTRACT.md).

  schemas:
    TokenRequest:
      type: object
      required: [grant_type, client_id, client_secret]
      properties:
        grant_type:
          type: string
          enum: [client_credentials]
        client_id:
          type: string
          description: |
            Issued by klikit at onboarding. `prod_*` prefix for production
            credentials, `sbx_*` for sandbox. Format `<prefix>_<uuid>`.
          example: prod_a1b2c3d4-e5f6-4789-a0b1-c2d3e4f5a6b7
        client_secret:
          type: string
          format: password
          description: Issued by klikit at onboarding. Rotatable with a 24h overlap window.
        scope:
          type: string
          description: |
            Space-separated subset of the scopes granted to the credential.
            If omitted, the token is issued with every granted scope. Valid
            scopes: `orders:read`, `orders:write`, `menus:read`, `mapping:write`,
            `stock:write`, `sandbox:write` (sandbox credentials only).
          example: orders:read orders:write menus:read mapping:write stock:write

    TokenResponse:
      type: object
      required: [access_token, token_type, expires_in, scope]
      properties:
        access_token:
          type: string
          description: "Signed JWT. Send as `Authorization: Bearer <access_token>`."
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          description: Seconds until access_token expires. Always 3600 in v1.
          example: 3600
        scope:
          type: string
          description: Space-separated scopes actually granted on this token.

    OAuthError:
      type: object
      description: RFC 6749 §5.2 error response.
      required: [error]
      properties:
        error:
          type: string
          enum:
            - invalid_request
            - invalid_client
            - invalid_grant
            - invalid_scope
            - unsupported_grant_type
            - rate_limit_exceeded
        error_description:
          type: string
          description: Human-readable detail. Safe to log; never contains the secret.
